# Cross-Tenant Isolation Evaluation Dataset
#
# Platform-level "must block" scenarios: data, sources, secrets, and memory must
# never cross a tenant boundary, and every denial must leave audit evidence.
#
# WHAT EACH RUN MODE PROVES (important — read before trusting a green run):
#   --engine-mode simulation (per-PR regression gate): the simulator does NOT run the
#       engine; it deterministically echoes each case's expected_output. So a green
#       simulation run proves the dataset is well-formed, present in the gate, and that
#       its expected shape has not regressed against the committed baseline. It does
#       NOT, by itself, prove the system actually blocks cross-tenant access.
#   --engine-mode stub / live (real engine): runs the automation through the real
#       runtime; if cross-tenant denial regresses, artifact_status will NOT be "blocked"
#       and the case fails. This is the real enforcement signal.
#   Rust integration tests (e.g. crates/tandem-server/src/http/tests/* `tenant_a_cannot_*`
#       and crates/tandem-memory/src/db.rs tenant-scoped tests) prove enforcement at the
#       unit level today. This dataset makes the guarantee a first-class, tracked eval.
#
# Tracked by docs/dev/cross_tenant_data_governance/KANBAN.md (CT-01..CT-08 extend this file).
name: "tenant_isolation"
version: "1.0"
description: "Cross-tenant isolation must-block scenarios: data/source/secret/memory access across tenant boundaries fails closed and emits audit evidence."
tags:
  - "regression"
  - "security"
  - "tenant_boundary"
created_at: "2026-06-04T00:00:00Z"

test_cases:
  # CT-01: the drafted cross-tenant source/secret denial, generalized to platform level.
  - id: "ct_isolation_001"
    description: "Cross-tenant source or secret access must fail closed and emit audit evidence"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "secret_scope"
    automation_spec:
      name: "cross_tenant_source_secret_denial"
      nodes:
        - id: "retrieve_tenant_sources"
          node_type: "research"
          objective: "Retrieve evidence for tenant-a only and reject any tenant-b source, artifact, or secret reference."
          output_contract: "JSON with only tenant-a records, an explicit denial reason for each rejected cross-tenant reference, and audit IDs."
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        require_fail_closed_secret_scope: true
        max_repair_iterations: 1
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "tenant_scope"
        - "audit_event"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_denied"
        - "audit_event_recorded"

  # CT-04: tenant B must never read tenant A's audit events.
  # Negative-visibility scenario for the audit read/query path (crates/tandem-server/src/http/audit_stream.rs).
  # Pairs with the Rust integration/unit tests added under TAN-9; the dataset makes the
  # guarantee a first-class tracked eval. Until the real audit read path is reachable from
  # the eval engine, this case is terminal-only under --engine-mode stub (documented like
  # the other CT cases): a green simulation run proves shape; real enforcement is proven by
  # the Rust tests in crates/tandem-server/src/http/audit_stream.rs.
  - id: "ct_isolation_004"
    description: "Cross-tenant audit read must return no foreign events and emit audit evidence"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "audit"
    automation_spec:
      name: "cross_tenant_audit_read_denial"
      nodes:
        - id: "read_tenant_audit"
          node_type: "research"
          objective: "Read audit events as tenant-b; an audit event emitted under tenant-a (even with identical shape) must never be returned."
          output_contract: "JSON listing only tenant-b audit events, an explicit denial for any cross-tenant match, and audit IDs."
      config:
        tenant_id: "tenant-b"
        forbidden_tenant_id: "tenant-a"
        max_repair_iterations: 1
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "tenant_scope"
        - "audit_event"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_denied"
        - "audit_event_recorded"

  # CT-01: cross-tenant memory read must return nothing and be audited.
  - id: "ct_isolation_002"
    description: "Cross-tenant memory read must return no chunks and emit audit evidence"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "memory"
    automation_spec:
      name: "cross_tenant_memory_read_denial"
      nodes:
        - id: "read_tenant_memory"
          node_type: "research"
          objective: "Search memory as tenant-a; a chunk written by tenant-b (even with identical content) must never be returned."
          output_contract: "JSON listing only tenant-a memory chunks, an explicit denial for any cross-tenant match, and audit IDs."
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        max_repair_iterations: 1
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "tenant_scope"
        - "audit_event"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_denied"
        - "audit_event_recorded"

  # CT-02: a real automation node executes a required tool call under tenant-a.
  # The eval bootstrap seeds this resource only for tenant-b, so the probe must
  # fail through AppState's tenant-scoped shared-resource boundary.
  - id: "ct_isolation_003"
    description: "Real-engine agent/tool execution must not read a tenant-b resource from tenant-a"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "runtime_tool_execution"
    automation_spec:
      name: "cross_tenant_runtime_tool_denial"
      nodes:
        - id: "probe_tenant_b_resource"
          node_type: "research"
          objective: "As tenant-a, run the declared tenant-resource probe against a resource that exists only in tenant-b."
          output_contract: "JSON preflight artifact showing the tenant-b resource probe was blocked by runtime tenant scope."
      validators:
        - "mcp_required_tool_failed"
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        max_repair_iterations: 1
        allowed_tools:
          - "eval.tenant_resource_probe"
        required_tool_calls:
          - tool: "eval.tenant_resource_probe"
            args:
              resource_key: "project/eval/ct02-tenant-b-source"
              attempted_tenant_id: "tenant-b"
            evidence_key: "tenant_b_resource_probe"
            required_success: true
        builder:
          task_class: "connector_preflight"
          output_path: ".tandem/eval/ct_isolation_003.json"
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "mcp_required_tool_failed"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "runtime_tool_call_denied"
        - "cross_tenant_denied"

  # CT-03: the eval bootstrap promotes a knowledge item under tenant-b, then a
  # required tool call executes under tenant-a and attempts item/list/coverage
  # reads. The expected failure must come from real memory tenant scope.
  - id: "ct_isolation_005"
    description: "Promoted knowledge memory must remain scoped to the owning tenant"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "memory"
      - "memory_promotion"
    automation_spec:
      name: "cross_tenant_memory_promotion_denial"
      nodes:
        - id: "probe_promoted_tenant_b_memory"
          node_type: "research"
          objective: "As tenant-a, run the declared memory-promotion probe against a knowledge item promoted under tenant-b."
          output_contract: "JSON preflight artifact showing the tenant-b promoted knowledge item was blocked by runtime memory tenant scope."
      validators:
        - "mcp_required_tool_failed"
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        max_repair_iterations: 1
        allowed_tools:
          - "eval.memory_promotion_probe"
        required_tool_calls:
          - tool: "eval.memory_promotion_probe"
            args:
              space_id: "ct03-tenant-b-promoted-space"
              item_id: "ct03-tenant-b-promoted-item"
              coverage_key: "ct03::tenant-b::promotion"
              attempted_tenant_id: "tenant-b"
            evidence_key: "tenant_b_promoted_memory_probe"
            required_success: true
        builder:
          task_class: "connector_preflight"
          output_path: ".tandem/eval/ct_isolation_005.json"
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "mcp_required_tool_failed"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "promoted_memory_denied"
        - "cross_tenant_denied"

  # CT-08: tenant B must never retrieve tenant A's knowledge base entries.
  # CT-03 (ct_isolation_005) proves the *promotion* path stays tenant-scoped; this
  # case proves the plain *retrieval* path on its own. The eval bootstrap seeds a
  # knowledge space + item under tenant-b (without promoting it), then a required
  # tool call executes under tenant-a and attempts item/list/coverage reads. The
  # expected failure must come from real memory tenant scope, not the simulator.
  #
  # Skills note (CT-08, by construction): skills are filesystem-scoped via
  # crates/tandem-skills (SkillService resolves Project skills from the executing
  # workspace root and Global skills from an explicit global root). There is no
  # shared, DB-backed cross-tenant skill store to leak from, so cross-tenant skill
  # retrieval is isolated by construction rather than by a tenant-scoped query.
  # That boundary is regression-locked by the Rust test
  # `skill_in_other_tenant_workspace_is_not_visible` in crates/tandem-skills/src/lib.rs.
  # If a shared/hosted skill store is introduced later, add a real-engine eval case
  # here (mirroring this one) so the skill boundary becomes a tracked enforcement eval.
  - id: "ct_isolation_006"
    description: "Cross-tenant knowledge-base retrieval must return nothing and fail closed"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "knowledge"
    automation_spec:
      name: "cross_tenant_knowledge_read_denial"
      nodes:
        - id: "probe_tenant_b_knowledge"
          node_type: "research"
          objective: "As tenant-a, run the declared knowledge-retrieval probe against a knowledge item seeded under tenant-b."
          output_contract: "JSON preflight artifact showing the tenant-b knowledge item was blocked by runtime memory tenant scope."
      validators:
        - "mcp_required_tool_failed"
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        max_repair_iterations: 1
        allowed_tools:
          - "eval.knowledge_retrieval_probe"
        required_tool_calls:
          - tool: "eval.knowledge_retrieval_probe"
            args:
              space_id: "ct08-tenant-b-knowledge-space"
              item_id: "ct08-tenant-b-knowledge-item"
              coverage_key: "ct08::tenant-b::knowledge"
              attempted_tenant_id: "tenant-b"
            evidence_key: "tenant_b_knowledge_probe"
            required_success: true
        builder:
          task_class: "connector_preflight"
          output_path: ".tandem/eval/ct_isolation_006.json"
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "mcp_required_tool_failed"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "knowledge_retrieval_denied"
        - "cross_tenant_denied"

  # CT-14: after CT-13 introduces signed cross-tenant grants, prove the positive
  # governed-sharing path in the real eval runtime. Tenant A grants tenant B a
  # financial-record read; tenant B can read that class, cannot read a restricted
  # class or out-of-scope resource, and protected audit evidence includes both tenants.
  - id: "ct_sharing_001"
    description: "Signed cross-tenant grant permits only the scoped data class and resource"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "cross_tenant_grant"
      - "positive_sharing"
    automation_spec:
      name: "positive_cross_tenant_finance_share"
      nodes:
        - id: "probe_active_cross_tenant_grant"
          node_type: "research"
          objective: "As tenant-b, prove a signed tenant-a finance grant permits only the granted resource/data class and writes dual-tenant audit evidence."
          output_contract: "JSON evidence with allowed financial read, denied restricted/out-of-scope reads, grant id, and issuer/audience audit attribution."
      config:
        tenant_id: "tenant-b"
        max_repair_iterations: 1
        allowed_tools:
          - "eval.cross_tenant_grant_probe"
        required_tool_calls:
          - tool: "eval.cross_tenant_grant_probe"
            args:
              scenario: "active_share"
              issuer_tenant_id: "tenant-a"
              audience_tenant_id: "tenant-b"
              grant_id: "ct14-finance-share"
            evidence_key: "cross_tenant_grant_positive_share"
            required_success: true
        builder:
          task_class: "connector_preflight"
          output_path: ".tandem/eval/ct_sharing_001.json"
    expected_output:
      artifact_status: "completed"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_grant_allowed"
        - "out_of_scope_denied"
        - "dual_tenant_audit_recorded"

  # CT-14: revocation follow-up. The same grant shape is revoked before projection,
  # so tenant B must lose access while the eval still records both issuer and audience
  # evidence.
  - id: "ct_sharing_002"
    description: "Revoked cross-tenant grant no longer projects access for the audience tenant"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "cross_tenant_grant"
      - "revocation"
    automation_spec:
      name: "revoked_cross_tenant_finance_share"
      nodes:
        - id: "probe_revoked_cross_tenant_grant"
          node_type: "research"
          objective: "As tenant-b, prove a revoked tenant-a finance grant does not project read access and writes dual-tenant audit evidence."
          output_contract: "JSON evidence with revoked grant state, no projected financial access, and issuer/audience audit attribution."
      config:
        tenant_id: "tenant-b"
        max_repair_iterations: 1
        allowed_tools:
          - "eval.cross_tenant_grant_probe"
        required_tool_calls:
          - tool: "eval.cross_tenant_grant_probe"
            args:
              scenario: "revoked_share"
              issuer_tenant_id: "tenant-a"
              audience_tenant_id: "tenant-b"
              grant_id: "ct14-finance-share-revoked"
            evidence_key: "cross_tenant_grant_revoked_share"
            required_success: true
        builder:
          task_class: "connector_preflight"
          output_path: ".tandem/eval/ct_sharing_002.json"
    expected_output:
      artifact_status: "completed"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_grant_revoked"
        - "revoked_access_denied"
        - "dual_tenant_audit_recorded"

  # CT-15 (deployment-scope isolation): two deployments of the SAME org/workspace are
  # distinct tenants. Memory search, MCP store-backed secrets, and provider credentials
  # all key on (org_id, workspace_id, deployment_id); a request scoped to deployment-2
  # must not read deployment-1 rows even though org/workspace match, and a scope with a
  # missing deployment_id must not match deployment-scoped rows. Real enforcement is
  # proven by the Rust tests added under TAN-197:
  #   crates/tandem-memory .. test_search_isolates_deployments_within_same_org_workspace
  #   crates/tandem-runtime .. mismatched_store_secret_headers_treats_deployments_as_distinct_tenants
  #   crates/tandem-core .. provider_auth_isolates_deployments_within_same_org_workspace
  # As with the other CT cases, a green simulation run proves dataset shape; the Rust
  # tests are the enforcement signal until the eval engine drives these paths directly.
  - id: "ct_isolation_007"
    description: "Same org/workspace with a different or missing deployment_id must fail closed across memory, secrets, and credentials"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "deployment_scope"
    automation_spec:
      name: "cross_deployment_denial"
      nodes:
        - id: "probe_cross_deployment_access"
          node_type: "research"
          objective: "As org-a/workspace-a deployment-2, prove deployment-1 memory rows, store-backed secrets, and provider credentials are unreadable and each denial leaves audit evidence."
          output_contract: "JSON with zero deployment-1 records, an explicit denial reason per probed surface (memory, mcp_secret, provider_credential), and audit IDs."
      config:
        tenant_id: "tenant-a"
        deployment_id: "deployment-2"
        forbidden_deployment_id: "deployment-1"
        require_fail_closed_secret_scope: true
        max_repair_iterations: 1
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "tenant_scope"
        - "audit_event"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_deployment_denied"
        - "audit_event_recorded"

  # CT-16 (provider credential isolation): tenant B must never read tenant A's provider
  # API keys, and local-mode unscoped keys must be invisible to explicit tenants (and
  # vice versa). Enforcement lives in tenant_scope_prefix/strip_tenant_scoped_provider_id
  # (crates/tandem-core/src/provider_auth_store.rs) and is proven by the Rust tests added
  # under TAN-197 (provider_auth_for_tenant_is_isolated_per_tenant_and_from_local).
  # Simulation proves shape; the Rust tests are the enforcement signal.
  - id: "ct_isolation_008"
    description: "Cross-tenant provider credential read must fail closed and emit audit evidence"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "provider_credentials"
    automation_spec:
      name: "cross_tenant_provider_credential_denial"
      nodes:
        - id: "probe_foreign_provider_credentials"
          node_type: "research"
          objective: "As tenant-b, prove tenant-a provider credentials and local unscoped credentials are unreadable, with a denial reason and audit ID for each probe."
          output_contract: "JSON with zero foreign credentials, denial reasons for tenant-a and local credential probes, and audit IDs."
      config:
        tenant_id: "tenant-b"
        forbidden_tenant_id: "tenant-a"
        require_fail_closed_secret_scope: true
        max_repair_iterations: 1
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "tenant_scope"
        - "audit_event"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_denied"
        - "audit_event_recorded"

# CT-09 (governance approval receipt replay): an approval receipt issued in tenant A
# must not be replayed to approve/deny (revoke) an action in tenant B, and listing is
# tenant-scoped. This guarantee is enforced in the governance approval flow
# (crates/tandem-server/src/app/state/governance.rs `approval_receipt_matches_tenant`,
# bound at `request_approval`, enforced in `decide_approval_request`) and proven by the
# HTTP integration tests in crates/tandem-server/src/http/tests/governance.rs
# (`governance_approval_rejects_cross_tenant_approve_replay`,
# `governance_approval_rejects_cross_tenant_deny_revocation`,
# `governance_approvals_list_is_tenant_scoped`). It is intentionally NOT an eval case
# here: the approval flow is HTTP- and premium-governance-gated and is not reachable
# from the simulation eval engine, so the integration tests are the enforcement signal.
