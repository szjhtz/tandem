# Cross-Tenant Isolation Evaluation Dataset
#
# Platform-level "must block" scenarios: data, sources, secrets, and memory must
# never cross a tenant boundary, and every denial must leave audit evidence.
#
# WHAT EACH RUN MODE PROVES (important — read before trusting a green run):
#   --engine-mode simulation (per-PR regression gate): the simulator does NOT run the
#       engine; it deterministically echoes each case's expected_output. So a green
#       simulation run proves the dataset is well-formed, present in the gate, and that
#       its expected shape has not regressed against the committed baseline. It does
#       NOT, by itself, prove the system actually blocks cross-tenant access.
#   --engine-mode stub / live (real engine): runs the automation through the real
#       runtime; if cross-tenant denial regresses, artifact_status will NOT be "blocked"
#       and the case fails. This is the real enforcement signal.
#   Rust integration tests (e.g. crates/tandem-server/src/http/tests/* `tenant_a_cannot_*`
#       and crates/tandem-memory/src/db.rs tenant-scoped tests) prove enforcement at the
#       unit level today. This dataset makes the guarantee a first-class, tracked eval.
#
# Tracked by docs/dev/cross_tenant_data_governance/KANBAN.md (CT-01..CT-04 extend this file).
name: "tenant_isolation"
version: "1.0"
description: "Cross-tenant isolation must-block scenarios: data/source/secret/memory access across tenant boundaries fails closed and emits audit evidence."
tags:
  - "regression"
  - "security"
  - "tenant_boundary"
created_at: "2026-06-04T00:00:00Z"

test_cases:
  # CT-01: the drafted cross-tenant source/secret denial, generalized to platform level.
  - id: "ct_isolation_001"
    description: "Cross-tenant source or secret access must fail closed and emit audit evidence"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "secret_scope"
    automation_spec:
      name: "cross_tenant_source_secret_denial"
      nodes:
        - id: "retrieve_tenant_sources"
          node_type: "research"
          objective: "Retrieve evidence for tenant-a only and reject any tenant-b source, artifact, or secret reference."
          output_contract: "JSON with only tenant-a records, an explicit denial reason for each rejected cross-tenant reference, and audit IDs."
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        require_fail_closed_secret_scope: true
        max_repair_iterations: 1
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "tenant_scope"
        - "audit_event"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_denied"
        - "audit_event_recorded"

  # CT-04: tenant B must never read tenant A's audit events.
  # Negative-visibility scenario for the audit read/query path (crates/tandem-server/src/http/audit_stream.rs).
  # Pairs with the Rust integration/unit tests added under TAN-9; the dataset makes the
  # guarantee a first-class tracked eval. Until the real audit read path is reachable from
  # the eval engine, this case is terminal-only under --engine-mode stub (documented like
  # the other CT cases): a green simulation run proves shape; real enforcement is proven by
  # the Rust tests in crates/tandem-server/src/http/audit_stream.rs.
  - id: "ct_isolation_004"
    description: "Cross-tenant audit read must return no foreign events and emit audit evidence"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "audit"
    automation_spec:
      name: "cross_tenant_audit_read_denial"
      nodes:
        - id: "read_tenant_audit"
          node_type: "research"
          objective: "Read audit events as tenant-b; an audit event emitted under tenant-a (even with identical shape) must never be returned."
          output_contract: "JSON listing only tenant-b audit events, an explicit denial for any cross-tenant match, and audit IDs."
      config:
        tenant_id: "tenant-b"
        forbidden_tenant_id: "tenant-a"
        max_repair_iterations: 1
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "tenant_scope"
        - "audit_event"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_denied"
        - "audit_event_recorded"

  # CT-01: cross-tenant memory read must return nothing and be audited.
  - id: "ct_isolation_002"
    description: "Cross-tenant memory read must return no chunks and emit audit evidence"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "memory"
    automation_spec:
      name: "cross_tenant_memory_read_denial"
      nodes:
        - id: "read_tenant_memory"
          node_type: "research"
          objective: "Search memory as tenant-a; a chunk written by tenant-b (even with identical content) must never be returned."
          output_contract: "JSON listing only tenant-a memory chunks, an explicit denial for any cross-tenant match, and audit IDs."
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        max_repair_iterations: 1
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "tenant_scope"
        - "audit_event"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "cross_tenant_denied"
        - "audit_event_recorded"

  # CT-02: a real automation node executes a required tool call under tenant-a.
  # The eval bootstrap seeds this resource only for tenant-b, so the probe must
  # fail through AppState's tenant-scoped shared-resource boundary.
  - id: "ct_isolation_003"
    description: "Real-engine agent/tool execution must not read a tenant-b resource from tenant-a"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "runtime_tool_execution"
    automation_spec:
      name: "cross_tenant_runtime_tool_denial"
      nodes:
        - id: "probe_tenant_b_resource"
          node_type: "research"
          objective: "As tenant-a, run the declared tenant-resource probe against a resource that exists only in tenant-b."
          output_contract: "JSON preflight artifact showing the tenant-b resource probe was blocked by runtime tenant scope."
      validators:
        - "mcp_required_tool_failed"
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        max_repair_iterations: 1
        allowed_tools:
          - "eval.tenant_resource_probe"
        required_tool_calls:
          - tool: "eval.tenant_resource_probe"
            args:
              resource_key: "project/eval/ct02-tenant-b-source"
              attempted_tenant_id: "tenant-b"
            evidence_key: "tenant_b_resource_probe"
            required_success: true
        builder:
          task_class: "connector_preflight"
          output_path: ".tandem/eval/ct_isolation_003.json"
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "mcp_required_tool_failed"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "runtime_tool_call_denied"
        - "cross_tenant_denied"

  # CT-03: the eval bootstrap promotes a knowledge item under tenant-b, then a
  # required tool call executes under tenant-a and attempts item/list/coverage
  # reads. The expected failure must come from real memory tenant scope.
  - id: "ct_isolation_005"
    description: "Promoted knowledge memory must remain scoped to the owning tenant"
    priority: 1
    enabled: true
    tags:
      - "security"
      - "tenant_boundary"
      - "memory"
      - "memory_promotion"
    automation_spec:
      name: "cross_tenant_memory_promotion_denial"
      nodes:
        - id: "probe_promoted_tenant_b_memory"
          node_type: "research"
          objective: "As tenant-a, run the declared memory-promotion probe against a knowledge item promoted under tenant-b."
          output_contract: "JSON preflight artifact showing the tenant-b promoted knowledge item was blocked by runtime memory tenant scope."
      validators:
        - "mcp_required_tool_failed"
      config:
        tenant_id: "tenant-a"
        forbidden_tenant_id: "tenant-b"
        max_repair_iterations: 1
        allowed_tools:
          - "eval.memory_promotion_probe"
        required_tool_calls:
          - tool: "eval.memory_promotion_probe"
            args:
              space_id: "ct03-tenant-b-promoted-space"
              item_id: "ct03-tenant-b-promoted-item"
              coverage_key: "ct03::tenant-b::promotion"
              attempted_tenant_id: "tenant-b"
            evidence_key: "tenant_b_promoted_memory_probe"
            required_success: true
        builder:
          task_class: "connector_preflight"
          output_path: ".tandem/eval/ct_isolation_005.json"
    expected_output:
      artifact_status: "blocked"
      required_validators:
        - "mcp_required_tool_failed"
      max_repair_iterations: 1
      output_format: "json"
      quality_indicators:
        - "promoted_memory_denied"
        - "cross_tenant_denied"
