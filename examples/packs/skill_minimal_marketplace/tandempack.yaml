manifest_schema_version: 1
pack_id: "tpk_01JX8R5S9J6N0M3Y4Q2W7K1B0Q"
name: reddit-gmail-helper
version: 0.1.0
type: skill
engine:
  requires: ">=0.9.0 <2.0.0"

marketplace:
  publisher:
    publisher_id: "pub_demo_team"
    display_name: "Demo Team"
    verification_tier: "unverified"
    website: "https://example.com"
    support: "hello@example.com"
  listing:
    display_name: "Reddit + Gmail Helper"
    description: "Summarize Reddit updates and draft Gmail responses."
    categories: ["productivity", "research"]
    tags: ["reddit", "gmail", "assistant"]
    license_spdx: "MIT"
    icon: "resources/marketplace/icon.png"
    screenshots: ["resources/marketplace/shot-1.png"]
    changelog: "resources/marketplace/CHANGELOG.md"

entrypoints:
  agents: ["reddit_gmail_helper"]

capabilities:
  required:
    - reddit.get_new
    - gmail.send_email
  optional:
    - gmail.create_email_draft
  non_portable: []

secrets:
  required:
    - key: GMAIL_TOKEN
      description: "OAuth token for Gmail"

contents:
  agents:
    - id: reddit_gmail_helper
      path: agents/reddit_gmail_helper.md
