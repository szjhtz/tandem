[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tandem-client"
version = "0.5.13"
description = "Python client for Tandem authority-layer runtime HTTP + SSE APIs"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["tandem", "ai", "agent", "llm", "sse", "autonomous"]
dependencies = [
  "httpx>=0.27",
  "httpx-sse>=0.4",
  "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "respx>=0.21",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["tandem_client"]

