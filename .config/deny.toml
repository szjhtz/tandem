[advisories]
version = 2
db-urls = ["https://github.com/RustSec/advisory-db"]
db-path = "~/.cargo/advisory-db"
yanked = "warn"
# Temporary advisory exceptions are documented in docs/CI_SECURITY_AND_COVERAGE.md.
ignore = [
    "RUSTSEC-2024-0320", # yaml-rust, transitive through syntect/ppt-rs
    "RUSTSEC-2024-0370", # proc-macro-error, transitive through gtk-rs/Tauri
    "RUSTSEC-2024-0384", # instant, transitive through fastrand
    "RUSTSEC-2024-0388", # derivative, transitive through zbus
    "RUSTSEC-2024-0411", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0412", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0413", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0414", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0415", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0416", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0417", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0418", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0419", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0420", # gtk-rs GTK3 bindings, transitive through Tauri Linux stack
    "RUSTSEC-2024-0436", # paste, transitive macro helper
    "RUSTSEC-2025-0057", # fxhash, transitive through selectors/html parsing
    "RUSTSEC-2025-0075", # rust-unic family, transitive through Tauri urlpattern
    "RUSTSEC-2025-0080", # rust-unic family, transitive through Tauri urlpattern
    "RUSTSEC-2025-0081", # rust-unic family, transitive through Tauri urlpattern
    "RUSTSEC-2025-0098", # rust-unic family, transitive through Tauri urlpattern
    "RUSTSEC-2025-0100", # rust-unic family, transitive through Tauri urlpattern
    "RUSTSEC-2025-0119", # number_prefix, transitive through indicatif
    "RUSTSEC-2025-0134", # rustls-pemfile 1.x, transitive through reqwest 0.11
    "RUSTSEC-2025-0141", # bincode 1.x, transitive through syntect/ppt-rs
    "RUSTSEC-2026-0105", # core2, transitive through image/rav1e
    "RUSTSEC-2026-0192", # ttf-parser, transitive through lopdf/pdf-extract
    "RUSTSEC-2026-0194", # quick-xml 0.39, transitive through wayland-scanner codegen
    "RUSTSEC-2026-0195", # quick-xml 0.39, transitive through wayland-scanner codegen
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
exceptions = [
    { name = "tandem-plan-compiler", allow = ["BUSL-1.1"] },
    { name = "tandem-governance-engine", allow = ["BUSL-1.1"] },
    { name = "tandem-enterprise-server", allow = ["BUSL-1.1"] },
    { name = "tandem-incident-monitor", allow = ["BUSL-1.1"] },
    { name = "tandem-server", allow = ["BUSL-1.1"] },
    # auto_generate_cdp is a build-dependency of headless_chrome only (CDP
    # protocol codegen that runs at compile time); it is never linked into a
    # shipped binary, so its own code is not distributed (TAN-628). html2md
    # (GPL-3.0-or-later, previously exempted here) was replaced by htmd
    # (Apache-2.0) in tandem-browser/tandem-tools — see TAN-628.
    { name = "auto_generate_cdp", allow = ["GPL-3.0-or-later"] },
    { name = "libfuzzer-sys", allow = ["NCSA"] },
    { name = "webpki-root-certs", allow = ["CDLA-Permissive-2.0"] },
    { name = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
