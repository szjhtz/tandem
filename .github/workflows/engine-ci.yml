name: Engine CI

on:
  pull_request:
    paths:
      - "engine/**"
      - "crates/**"
      - "guide/src/content/docs/**"
      - "scripts/generate-engine-knowledge-bundle.mjs"
      - "Cargo.toml"
      - ".github/workflows/engine-ci.yml"
  push:
    branches: ["feat/engine"]
    paths:
      - "engine/**"
      - "crates/**"
      - "guide/src/content/docs/**"
      - "scripts/generate-engine-knowledge-bundle.mjs"
      - "Cargo.toml"
      - ".github/workflows/engine-ci.yml"

jobs:
  engine-checks:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify embedded knowledge bundle is in sync
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-engine-knowledge-bundle.mjs
          git diff --exit-code -- engine/resources/default_knowledge_bundle.json engine/resources/default_knowledge_manifest.json

      - name: Cargo check
        run: cargo check -p tandem-ai

      - name: Cargo test
        run: cargo test -p tandem-ai

      - name: Cargo clippy
        run: cargo clippy -p tandem-ai -- -D warnings

      - name: Cargo fmt
        run: cargo fmt --check
