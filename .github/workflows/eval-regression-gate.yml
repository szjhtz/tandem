name: Evaluation Regression Gate

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  eval-regression-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/tandem-eval

      # The gate must fail when the eval-runner cannot be built. A broken build
      # previously fell back to hardcoded stub results, which let governance
      # regressions pass CI with a plausible-looking green check (TAN-219).
      - name: Build eval-runner binary
        run: |
          if ! cargo build --release --bin eval-runner -p tandem-eval; then
            echo "::error::eval-runner failed to build — the evaluation gate cannot run. Fix the build; there is no stub fallback."
            exit 1
          fi

      - name: Load main branch baseline (if exists)
        id: load-baseline
        run: |
          if [ -f "eval_baselines/main_branch.json" ]; then
            echo "baseline_exists=true" >> $GITHUB_OUTPUT
          else
            echo "baseline_exists=false" >> $GITHUB_OUTPUT
            echo "Creating initial baseline..."
          fi

      # No stub fallbacks below: if the runner is missing or crashes, the job
      # fails here. Artifact upload and the PR comment still run via always().
      - name: Run critical-path evaluation
        id: eval-run
        run: |
          ./target/release/eval-runner \
            --dataset eval_datasets/critical_path.yaml \
            --output /tmp/eval_results.json \
            --simulation \
            --verbose

      - name: Run tenant-isolation evaluation
        id: eval-run-tenant
        run: |
          ./target/release/eval-runner \
            --dataset eval_datasets/tenant_isolation.yaml \
            --output /tmp/tenant_isolation_results.json \
            --simulation \
            --verbose

      - name: Run action-firewall evaluation
        id: eval-run-action-firewall
        run: |
          ./target/release/eval-runner \
            --dataset eval_datasets/action_firewall.yaml \
            --output /tmp/action_firewall_results.json \
            --simulation \
            --verbose

      - name: Run cross-user memory isolation evaluation
        id: eval-run-cross-user
        run: |
          ./target/release/eval-runner \
            --dataset eval_datasets/cross_user_memory_isolation.yaml \
            --output /tmp/cross_user_memory_isolation_results.json \
            --simulation \
            --verbose

      - name: Tenant-isolation regression check
        id: regression-check-tenant
        continue-on-error: true
        run: |
          if [ ! -f eval_baselines/tenant_isolation.json ]; then
            echo "No tenant-isolation baseline yet; skipping comparison."
            exit 0
          fi
          CURRENT=$(jq '.pass_rate' /tmp/tenant_isolation_results.json)
          BASELINE=$(jq '.pass_rate' eval_baselines/tenant_isolation.json)
          echo "tenant-isolation current pass rate: $CURRENT (baseline: $BASELINE)"
          DROP=$(echo "$BASELINE - $CURRENT" | bc)
          if (( $(echo "$DROP >= 0.05" | bc -l) )); then
            echo "::error::Tenant-isolation pass-rate regression: ${DROP} (threshold: 0.05)"
            exit 1
          fi

      - name: Action-firewall regression check
        id: regression-check-action-firewall
        continue-on-error: true
        run: |
          if [ ! -f eval_baselines/action_firewall.json ]; then
            echo "No action-firewall baseline yet; skipping comparison."
            exit 0
          fi
          CURRENT=$(jq '.pass_rate' /tmp/action_firewall_results.json)
          BASELINE=$(jq '.pass_rate' eval_baselines/action_firewall.json)
          echo "action-firewall current pass rate: $CURRENT (baseline: $BASELINE)"
          DROP=$(echo "$BASELINE - $CURRENT" | bc)
          if (( $(echo "$DROP >= 0.05" | bc -l) )); then
            echo "::error::Action-firewall pass-rate regression: ${DROP} (threshold: 0.05)"
            exit 1
          fi

      - name: Cross-user memory isolation regression check
        id: regression-check-cross-user
        continue-on-error: true
        run: |
          if [ ! -f eval_baselines/cross_user_memory_isolation.json ]; then
            echo "No cross-user memory isolation baseline yet; skipping comparison."
            exit 0
          fi
          CURRENT=$(jq '.pass_rate' /tmp/cross_user_memory_isolation_results.json)
          BASELINE=$(jq '.pass_rate' eval_baselines/cross_user_memory_isolation.json)
          echo "cross-user memory isolation current pass rate: $CURRENT (baseline: $BASELINE)"
          DROP=$(echo "$BASELINE - $CURRENT" | bc)
          if (( $(echo "$DROP >= 0.05" | bc -l) )); then
            echo "::error::Cross-user memory isolation pass-rate regression: ${DROP} (threshold: 0.05)"
            exit 1
          fi

      - name: Compare against baseline (if exists)
        id: regression-check
        if: steps.load-baseline.outputs.baseline_exists == 'true'
        continue-on-error: true
        run: |
          # This would integrate with regression_detection logic
          # For now, basic pass/fail check on pass_rate
          CURRENT_PASS_RATE=$(jq '.pass_rate' /tmp/eval_results.json)
          BASELINE_PASS_RATE=$(jq '.pass_rate' eval_baselines/main_branch.json)

          echo "Current pass rate: $CURRENT_PASS_RATE"
          echo "Baseline pass rate: $BASELINE_PASS_RATE"

          # Check if drop exceeds 5 percentage points
          PASS_RATE_DROP=$(echo "$BASELINE_PASS_RATE - $CURRENT_PASS_RATE" | bc)
          CRITICAL_THRESHOLD="0.05"

          if (( $(echo "$PASS_RATE_DROP >= $CRITICAL_THRESHOLD" | bc -l) )); then
            echo "::error::Pass rate regression detected: ${PASS_RATE_DROP} (threshold: ${CRITICAL_THRESHOLD})"
            exit 1
          fi

          echo "regression_status=pass" >> $GITHUB_OUTPUT

      - name: Generate regression report
        if: steps.load-baseline.outputs.baseline_exists == 'true'
        run: |
          echo "## Evaluation Regression Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pass Rate:** $(jq '.pass_rate' /tmp/eval_results.json)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Comparison against main branch baseline:**" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          jq . /tmp/eval_results.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Save results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            /tmp/eval_results.json
            /tmp/tenant_isolation_results.json
            /tmp/action_firewall_results.json
            /tmp/cross_user_memory_isolation_results.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Results may be missing if the build or an eval run failed. Never
            // fabricate numbers: report the failure explicitly instead.
            const read = (path) => {
              try { return JSON.parse(fs.readFileSync(path, 'utf8')); } catch (e) { return null; }
            };
            const results = read('/tmp/eval_results.json');
            const tenant = read('/tmp/tenant_isolation_results.json');
            const actionFirewall = read('/tmp/action_firewall_results.json');
            const crossUser = read('/tmp/cross_user_memory_isolation_results.json');

            const line = (label, r) => r
              ? `\n**${label}:** ${(r.pass_rate * 100).toFixed(1)}% (${r.passed_tests}/${r.total_tests})`
              : `\n**${label}:** ❌ no results produced (build or eval run failed — see job logs)`;

            const header = (results && tenant && actionFirewall && crossUser)
              ? '## 📊 AI Evaluation Results'
              : '## ❌ AI Evaluation Gate Failed';

            const comment = `${header}
            ${line('Critical path', results)}${line('Tenant isolation', tenant)}${line('Action Firewall', actionFirewall)}${line('Cross-user memory isolation', crossUser)}

            See artifacts for detailed results.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Report baseline drift on main branch push
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p eval_baselines
          if [ -f "eval_baselines/main_branch.json" ] && cmp -s /tmp/eval_results.json eval_baselines/main_branch.json; then
            echo "Evaluation baseline is current."
            exit 0
          fi

          echo "::notice::Evaluation baseline differs from this run. Download the eval-results artifact and update eval_baselines/main_branch.json in a normal reviewed commit if this change is intentional."
          echo "## Evaluation Baseline Drift" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This run produced evaluation results that differ from \`eval_baselines/main_branch.json\`." >> $GITHUB_STEP_SUMMARY
          echo "CI no longer commits directly to \`main\`; update the baseline in a regular commit when the new results are intentional." >> $GITHUB_STEP_SUMMARY

      - name: Fail if regression detected
        if: steps.regression-check.outcome == 'failure'
        run: exit 1

      - name: Fail if tenant-isolation regression detected
        if: steps.regression-check-tenant.outcome == 'failure'
        run: exit 1

      - name: Fail if action-firewall regression detected
        if: steps.regression-check-action-firewall.outcome == 'failure'
        run: exit 1

      - name: Fail if cross-user memory isolation regression detected
        if: steps.regression-check-cross-user.outcome == 'failure'
        run: exit 1
