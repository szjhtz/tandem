name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  actions: write
  contents: write

jobs:
  sync-versions:
    name: Sync Versions From Tag
    runs-on: ubuntu-latest
    outputs:
      tag_updated: ${{ steps.sync.outputs.tag_updated }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync versions with tag
        id: sync
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$TAG_NAME" =~ ^v ]]; then
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$TAG_NAME"
          fi
          export VERSION
          echo "Using version: $VERSION"

          python - <<'PY'
          import datetime
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          root = Path(".")

          def plus_years(day, years):
            try:
              return day.replace(year=day.year + years)
            except ValueError:  # Feb 29 -> non-leap target year
              return day.replace(year=day.year + years, month=3, day=1)

          # Rolling BUSL Change Date (docs/LICENSING.md, "Change Date policy"):
          # each released version converts to the Change License four years
          # after release. Mirrors scripts/bump-version.sh for the tag-sync
          # path (TAN-631).
          busl_change_date = plus_years(datetime.date.today(), 4).isoformat()

          def stamp_busl_change_date(path: Path) -> None:
            text = path.read_text()
            if "Business Source License 1.1" not in text:
              return
            updated = re.sub(
              r"(?m)^Change Date: \d{4}-\d{2}-\d{2}[ \t]*$",
              f"Change Date: {busl_change_date}",
              text,
            )
            if updated != text:
              path.write_text(updated)

          def update_json(path: Path, key: str = "version") -> None:
            data = json.loads(path.read_text())
            if data.get(key) != version:
              data[key] = version
              path.write_text(json.dumps(data, indent=2) + "\n")

          def update_cargo_toml(path: Path) -> None:
            lines = path.read_text().splitlines()
            out = []
            section = None
            for line in lines:
              header = re.match(r"\s*\[(.+?)\]\s*$", line)
              if header:
                section = header.group(1)
              if section == "package":
                line = re.sub(r'^(\s*version\s*=\s*)"[^"]+"', rf'\1"{version}"', line)
              if "path" in line and "version" in line:
                line = re.sub(r'(version\s*=\s*)"[^"]+"', rf'\1"{version}"', line)
              out.append(line)
            path.write_text("\n".join(out) + "\n")

          def update_pyproject_version(path: Path) -> None:
            data = path.read_text()
            updated = re.sub(
              r'(?m)^(version\s*=\s*)"[^"]+"',
              rf'\1"{version}"',
              data,
            )
            path.write_text(updated)

          cargo_paths = []
          cargo_paths.extend(root.glob("crates/*/Cargo.toml"))
          cargo_paths.append(root / "engine" / "Cargo.toml")
          cargo_paths.append(root / "apps" / "tandem-desktop" / "src-tauri" / "Cargo.toml")

          for cargo in cargo_paths:
            update_cargo_toml(cargo)

          update_json(root / "package.json")
          update_json(root / "apps" / "tandem-desktop" / "package.json")
          update_json(root / "packages" / "tandem-engine" / "package.json")
          update_json(root / "packages" / "tandem-enterprise" / "package.json")
          update_json(root / "packages" / "tandem-tui" / "package.json")
          update_json(root / "packages" / "tandem-ai" / "package.json")
          update_json(root / "packages" / "tandem-client-ts" / "package.json")
          update_json(root / "packages" / "tandem-control-panel" / "package.json")
          update_json(root / "packages" / "create-tandem-panel" / "package.json")
          update_pyproject_version(root / "packages" / "tandem-client-py" / "pyproject.toml")
          update_json(root / "apps" / "tandem-desktop" / "src-tauri" / "tauri.conf.json")

          for license_path in root.glob("crates/*/LICENSE"):
            stamp_busl_change_date(license_path)
          PY

          if git diff --quiet; then
            echo "tag_updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/*/Cargo.toml \
            crates/*/LICENSE \
            engine/Cargo.toml \
            apps/tandem-desktop/src-tauri/Cargo.toml \
            apps/tandem-desktop/src-tauri/tauri.conf.json \
            package.json \
            apps/tandem-desktop/package.json \
            packages/tandem-engine/package.json \
            packages/tandem-enterprise/package.json \
            packages/tandem-tui/package.json \
            packages/tandem-ai/package.json \
            packages/tandem-client-ts/package.json \
            packages/tandem-control-panel/package.json \
            packages/create-tandem-panel/package.json \
            packages/tandem-client-py/pyproject.toml
          git commit -m "chore(release): bump versions to ${VERSION}"
          git tag -f "${TAG_NAME}"
          git push origin HEAD:main
          git push --force origin "refs/tags/${TAG_NAME}"
          echo "tag_updated=true" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create Release
    needs: sync-versions
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      release_body: ${{ steps.release-body.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate release notes
        run: node scripts/extract-release-notes.js "${{ github.ref_name }}" > release_notes.md

      - name: Export release body output
        id: release-body
        shell: bash
        run: |
          {
            echo "release_body<<EOF"
            cat release_notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseNotes = fs.readFileSync('release_notes.md', 'utf8');
            const tag = context.ref.replace('refs/tags/', '');
            const isPrerelease = /-(alpha|beta|rc)(?:[.-]\d+)?$/i.test(tag);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Tandem ${tag}`,
              body: releaseNotes,
              draft: true,
              prerelease: isPrerelease,
              make_latest: isPrerelease ? 'false' : 'true',
              generate_release_notes: false
            });
            return data.id;

  build-release:
    name: Build Runtime Assets (${{ matrix.platform }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            engine_asset: tandem-engine-linux-x64.tar.gz
            enterprise_engine_asset: tandem-engine-enterprise-linux-x64.tar.gz
            tui_asset: tandem-tui-linux-x64.tar.gz
            browser_asset: tandem-browser-linux-x64.tar.gz
            standalone_archive: tar.gz
          - platform: macos-latest
            target: x86_64-apple-darwin
            engine_asset: tandem-engine-darwin-x64.zip
            tui_asset: tandem-tui-darwin-x64.zip
            browser_asset: tandem-browser-darwin-x64.zip
            standalone_archive: zip
          - platform: macos-latest
            target: aarch64-apple-darwin
            engine_asset: tandem-engine-darwin-arm64.zip
            tui_asset: tandem-tui-darwin-arm64.zip
            browser_asset: tandem-browser-darwin-arm64.zip
            standalone_archive: zip
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            engine_asset: tandem-engine-windows-x64.zip
            tui_asset: tandem-tui-windows-x64.zip
            browser_asset: tandem-browser-windows-x64.zip
            standalone_archive: zip

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.ref_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build runtime binaries (Unix)
        if: ${{ matrix.platform != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target ${{ matrix.target }} -p tandem-ai -p tandem-tui -p tandem-browser --features tandem-ai/browser
          if [ -n "${{ matrix.enterprise_engine_asset || '' }}" ]; then
            cargo build --release --target ${{ matrix.target }} -p tandem-ai --features tandem-ai/browser,tandem-ai/enterprise-full
            cp "target/${{ matrix.target }}/release/tandem-engine" "target/${{ matrix.target }}/release/tandem-engine-enterprise"
            cargo build --release --target ${{ matrix.target }} -p tandem-ai -p tandem-tui -p tandem-browser --features tandem-ai/browser
          fi

      - name: Build runtime binaries (Windows)
        if: ${{ matrix.platform == 'windows-latest' }}
        shell: pwsh
        run: cargo build --release --target ${{ matrix.target }} -p tandem-ai -p tandem-tui -p tandem-browser --features tandem-ai/browser

      - name: Package standalone engine/tui/browser assets (Windows)
        if: ${{ matrix.platform == 'windows-latest' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/tandem-engine.exe" "dist/tandem-engine.exe" -Force
          Copy-Item "target/${{ matrix.target }}/release/tandem-tui.exe" "dist/tandem-tui.exe" -Force
          Copy-Item "target/${{ matrix.target }}/release/tandem-browser.exe" "dist/tandem-browser.exe" -Force
          Compress-Archive -Path "dist/tandem-engine.exe" -DestinationPath "dist/${{ matrix.engine_asset }}" -Force
          Compress-Archive -Path "dist/tandem-tui.exe" -DestinationPath "dist/${{ matrix.tui_asset }}" -Force
          Compress-Archive -Path "dist/tandem-browser.exe" -DestinationPath "dist/${{ matrix.browser_asset }}" -Force

      - name: Package standalone engine/tui/browser assets (Unix)
        if: ${{ matrix.platform != 'windows-latest' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/tandem-engine" dist/tandem-engine
          cp "target/${{ matrix.target }}/release/tandem-tui" dist/tandem-tui
          cp "target/${{ matrix.target }}/release/tandem-browser" dist/tandem-browser
          chmod +x dist/tandem-engine dist/tandem-tui dist/tandem-browser
          if [ -n "${{ matrix.enterprise_engine_asset || '' }}" ]; then
            cp "target/${{ matrix.target }}/release/tandem-engine-enterprise" dist/tandem-engine-enterprise
            chmod +x dist/tandem-engine-enterprise
          fi

          if [ "${{ matrix.standalone_archive }}" = "zip" ]; then
            zip -j "dist/${{ matrix.engine_asset }}" dist/tandem-engine
            zip -j "dist/${{ matrix.tui_asset }}" dist/tandem-tui
            zip -j "dist/${{ matrix.browser_asset }}" dist/tandem-browser
          else
            tar -czf "dist/${{ matrix.engine_asset }}" -C dist tandem-engine
            if [ -n "${{ matrix.enterprise_engine_asset || '' }}" ]; then
              mkdir -p dist/enterprise
              cp dist/tandem-engine-enterprise dist/enterprise/tandem-engine
              tar -czf "dist/${{ matrix.enterprise_engine_asset }}" -C dist/enterprise tandem-engine
            fi
            tar -czf "dist/${{ matrix.tui_asset }}" -C dist tandem-tui
            tar -czf "dist/${{ matrix.browser_asset }}" -C dist tandem-browser
          fi

      - name: Upload standalone runtime assets to release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          ENGINE_ASSET: ${{ matrix.engine_asset }}
          TUI_ASSET: ${{ matrix.tui_asset }}
          BROWSER_ASSET: ${{ matrix.browser_asset }}
          ENTERPRISE_ENGINE_ASSET: ${{ matrix.enterprise_engine_asset || '' }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const releaseId = Number(process.env.RELEASE_ID);
            const assets = [
              process.env.ENGINE_ASSET,
              process.env.TUI_ASSET,
              process.env.BROWSER_ASSET,
              process.env.ENTERPRISE_ENGINE_ASSET,
            ].filter(Boolean);

            const existing = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              per_page: 100,
            });

            for (const assetName of assets) {
              const assetPath = path.join(process.cwd(), 'dist', assetName);
              const data = fs.readFileSync(assetPath);
              const contentType = assetName.endsWith('.zip')
                ? 'application/zip'
                : 'application/gzip';

              const duplicate = existing.data.find((asset) => asset.name === assetName);
              if (duplicate) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: duplicate.id,
                });
              }

              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: assetName,
                data,
                headers: {
                  'content-type': contentType,
                  'content-length': data.length,
                },
              });
            }

  publish-release:
    name: Publish Release
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.RELEASE_ID,
              draft: false
            });

  notify-discord:
    name: Notify Discord
    needs: [create-release, publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Check Discord webhook
        id: discord_webhook
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post release to Discord
        if: ${{ steps.discord_webhook.outputs.configured == 'true' }}
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          DISCORD_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        with:
          script: |
            const releaseId = process.env.RELEASE_ID;
            const webhook = process.env.DISCORD_WEBHOOK_URL;
            if (!releaseId || !webhook) {
              core.warning('Missing RELEASE_ID or DISCORD_WEBHOOK_URL; skipping Discord notification.');
              return;
            }

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(releaseId),
            });

            // Discord limits: content <= 2000 chars; embed description <= 4096 chars.
            const truncate = (s, n) => (s && s.length > n ? `${s.slice(0, n - 3)}...` : (s || ''));
            const description = truncate(release.body, 4000);

            const payload = {
              content: '||@everyone||',
              embeds: [
                {
                  title: release.name || release.tag_name,
                  url: release.html_url,
                  description,
                  color: 2105893,
                  footer: { text: 'Changelog' },
                },
              ],
            };

            const resp = await fetch(webhook, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify(payload),
            });

            if (!resp.ok) {
              const text = await resp.text().catch(() => '');
              core.setFailed(`Discord webhook failed: ${resp.status} ${resp.statusText} ${text}`.trim());
            }

  trigger-registry-publish:
    name: Trigger Registry Publish
    needs: [publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch publish-registries workflow
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          DISABLE_NPM_ENTERPRISE_PUBLISH: ${{ vars.DISABLE_NPM_ENTERPRISE_PUBLISH }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG || '';
            const version = tag.startsWith('v') ? tag.slice(1) : tag;
            if (!/^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$/.test(version)) {
              core.setFailed(`Unable to derive semver version from tag: ${tag}`);
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-registries.yml',
              ref: 'main',
              inputs: {
                version,
                publish_crates: 'true',
                publish_npm: 'true',
                publish_npm_enterprise: process.env.DISABLE_NPM_ENTERPRISE_PUBLISH === 'true' ? 'false' : 'true',
                publish_pypi: 'true',
                dry_run: 'false',
              },
            });

            core.info(`Triggered publish-registries.yml for version ${version}`);
